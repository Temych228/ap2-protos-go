name: Generate Go code from Proto files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout generator repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          path: generator

      - name: Clone Proto Files Repository
        run: |
          git clone https://github.com/Temych228/ap2-protos.git protos

      - name: Install protoc plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Go Code from Proto Files
        run: |
          cd protos
          mkdir -p ../generator/payment/v1
          mkdir -p ../generator/order/v1

          protoc \
            --go_out=../generator \
            --go_opt=paths=source_relative \
            --go-grpc_out=../generator \
            --go-grpc_opt=paths=source_relative \
            payment/v1/payment.proto order/v1/order.proto

      - name: Commit and push generated files
        run: |
          cd generator
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "auto-generate protobuf files" || echo "No changes"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Temych228/ap2-protos-go.git HEAD:main